<div class="flex flex-col gap-1">
  <label [for]="inputId" class="text-xs font-medium text-text-secondary">
    {{ label }}
  </label>

  <input
    [id]="inputId"
    [type]="type"
    [placeholder]="placeholder"
    [formControl]="control"
    class="w-full px-3 py-2 bg-background-main border border-border-light rounded-sm text-sm text-text-primary placeholder-text-tertiary focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all duration-200"
    [ngClass]="{
      'border-status-high focus:border-status-high focus:ring-status-high': control.invalid && (control.dirty || control.touched)
    }"
  />

  @if (control.invalid && (control.dirty || control.touched)) {
    @if (control.errors?.['required']) {
      <span class="text-xs text-status-high mt-1">
        This field is required.
      </span>
    }
    @if (control.errors?.['email']) {
      <span class="text-xs text-status-high mt-1">
        Please enter a valid email address.
      </span>
    }
  }
</div>
